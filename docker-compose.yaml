services:
  postgres:
    image: postgres:16.0
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"  # пробрасываем порт на хост
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    container_name: server
    build: .
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    hostname: 'host'

  redis:
    image: redis
    ports:
      - "6379:6379"
    env_file:
      - .env

volumes:
  postgres_data: